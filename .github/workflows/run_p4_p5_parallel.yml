name: Run Scraper P4 P5 Parallel

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: seed or full"
        required: true
        default: "full"

concurrency:
  group: document-monitor-p4-p5
  cancel-in-progress: false

jobs:
  scrape-shards:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - shard: "01"
            target_url_file: p4_p5/documents_p4_p5_01.csv
            output_file: output_p4_p5_01_work.csv
            issues_file: capture_issues_p4_p5_01_work.csv
            diff_file: diff_p4_p5_01_work.csv
            known_file: known_documents_p4_p5_01_work.csv
            summary_file: run_summary_p4_p5_01_work.csv
            status_file: url_status_p4_p5_01_work.csv
            canonical_file: document_canonical_keys_p4_p5_01_work.csv

          - shard: "02"
            target_url_file: p4_p5/documents_p4_p5_02.csv
            output_file: output_p4_p5_02_work.csv
            issues_file: capture_issues_p4_p5_02_work.csv
            diff_file: diff_p4_p5_02_work.csv
            known_file: known_documents_p4_p5_02_work.csv
            summary_file: run_summary_p4_p5_02_work.csv
            status_file: url_status_p4_p5_02_work.csv
            canonical_file: document_canonical_keys_p4_p5_02_work.csv

          - shard: "03"
            target_url_file: p4_p5/documents_p4_p5_03.csv
            output_file: output_p4_p5_03_work.csv
            issues_file: capture_issues_p4_p5_03_work.csv
            diff_file: diff_p4_p5_03_work.csv
            known_file: known_documents_p4_p5_03_work.csv
            summary_file: run_summary_p4_p5_03_work.csv
            status_file: url_status_p4_p5_03_work.csv
            canonical_file: document_canonical_keys_p4_p5_03_work.csv

          - shard: "04"
            target_url_file: p4_p5/documents_p4_p5_04.csv
            output_file: output_p4_p5_04_work.csv
            issues_file: capture_issues_p4_p5_04_work.csv
            diff_file: diff_p4_p5_04_work.csv
            known_file: known_documents_p4_p5_04_work.csv
            summary_file: run_summary_p4_p5_04_work.csv
            status_file: url_status_p4_p5_04_work.csv
            canonical_file: document_canonical_keys_p4_p5_04_work.csv

          - shard: "05"
            target_url_file: p4_p5/documents_p4_p5_05.csv
            output_file: output_p4_p5_05_work.csv
            issues_file: capture_issues_p4_p5_05_work.csv
            diff_file: diff_p4_p5_05_work.csv
            known_file: known_documents_p4_p5_05_work.csv
            summary_file: run_summary_p4_p5_05_work.csv
            status_file: url_status_p4_p5_05_work.csv
            canonical_file: document_canonical_keys_p4_p5_05_work.csv

          - shard: "06"
            target_url_file: p4_p5/documents_p4_p5_06.csv
            output_file: output_p4_p5_06_work.csv
            issues_file: capture_issues_p4_p5_06_work.csv
            diff_file: diff_p4_p5_06_work.csv
            known_file: known_documents_p4_p5_06_work.csv
            summary_file: run_summary_p4_p5_06_work.csv
            status_file: url_status_p4_p5_06_work.csv
            canonical_file: document_canonical_keys_p4_p5_06_work.csv

    env:
      RUN_MODE: ${{ github.event.inputs.run_mode }}
      TARGET_URL_FILE: ${{ matrix.target_url_file }}

      OUTPUT_FILE: ${{ matrix.output_file }}
      ISSUES_FILE: ${{ matrix.issues_file }}
      DIFF_FILE: ${{ matrix.diff_file }}
      KNOWN_DOCUMENTS_FILE: ${{ matrix.known_file }}
      RUN_SUMMARY_FILE: ${{ matrix.summary_file }}
      URL_STATUS_FILE: ${{ matrix.status_file }}
      DOCUMENT_CANONICAL_FILE: ${{ matrix.canonical_file }}

      ENABLE_DIFF_DECISION_LOGS: "true"

      ENABLE_BROWSER_FALLBACK: "false"
      SLEEP_SECONDS: "1"
      RETRY_FAILED_URLS: "true"
      RETRY_SLEEP_SECONDS: "20"

      ENABLE_PDF_METADATA_DIFF_FILTER: "true"
      PDF_METADATA_RECENCY_DAYS: "60"
      PDF_METADATA_MAX_BYTES: "104857600"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare temporary DB files
        run: |
          if [ -f p4_p5/known_documents_p4_p5.csv ]; then
            cp p4_p5/known_documents_p4_p5.csv "${KNOWN_DOCUMENTS_FILE}"
          fi

          if [ -f diff_p4_p5.csv ]; then
            cp diff_p4_p5.csv "${DIFF_FILE}"
          fi

          if [ -f p4_p5/output_p4_p5.csv ]; then
            cp p4_p5/output_p4_p5.csv "${OUTPUT_FILE}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright PyPDF2
          playwright install chromium

      - name: Check Python syntax
        run: python -m py_compile scrape.py

      - name: Run scraper shard ${{ matrix.shard }}
        run: python scrape.py

      - name: Upload shard outputs
        uses: actions/upload-artifact@v4
        with:
          name: p4-p5-shard-${{ matrix.shard }}
          path: |
            ${{ matrix.output_file }}
            ${{ matrix.issues_file }}
            ${{ matrix.diff_file }}
            ${{ matrix.known_file }}
            ${{ matrix.summary_file }}
            ${{ matrix.status_file }}

  merge-results:
    if: ${{ always() }}
    needs: scrape-shards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download shard outputs
        uses: actions/download-artifact@v4
        with:
          path: shard_outputs

      - name: Merge P4 P5 shard results
        run: |
          mkdir -p p4_p5

          python - <<'PY'
          import csv
          import os
          import glob
          from urllib.parse import urlparse

          OUTPUT_FIELDS = ["company", "document_title", "document_title_source", "document_url"]
          DIFF_FIELDS = ["date", "company", "document_title", "document_url"]
          KNOWN_FIELDS = ["first_seen_date", "company", "document_title", "document_url", "source_run_mode"]
          ISSUE_FIELDS = ["date", "run_mode", "url_file", "source_url", "issue_type", "status_code", "documents_captured", "error_message"]

          URL_STATUS_FIELDS = [
              "url",
              "last_working_date",
              "last_working_docs_count",
              "latest_status_code",
              "latest_issue",
              "url_file"
          ]

          SUMMARY_FIELDS = [
              "run_number",
              "date",
              "run_mode",
              "url_file",
              "total_urls_processed",
              "total_documents_captured",
              "new_diff_records",
              "issue_count",
              "success_zero_docs_count",
              "fetch_failed_status_count",
              "fetch_error_count",
              "browser_fallback_enabled",
              "output_file",
              "raw_file",
              "issues_file"
          ]

          def normalize_url_key(url):
              parsed = urlparse(url or "")
              return f"{parsed.scheme}://{parsed.netloc}{parsed.path}".lower()

          def clean_source_url(raw):
              raw = (raw or "").strip()
              lower = raw.lower()

              for prefix in ["fallback/", "fallback:"]:
                  if lower.startswith(prefix):
                      return raw[len(prefix):].strip()

              return raw

          def read_csv(path):
              if not os.path.exists(path):
                  return []

              with open(path, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  return list(reader)

          def write_csv(path, fieldnames, rows):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  writer.writerows(rows)

          def dedupe_rows(rows, key_field):
              final = []
              seen = set()

              for row in rows:
                  key = normalize_url_key(row.get(key_field, ""))

                  if not key:
                      continue

                  if key in seen:
                      continue

                  seen.add(key)
                  final.append(row)

              return final

          def get_target_source_keys(files):
              keys = set()

              for file in files:
                  if not os.path.exists(file):
                      continue

                  with open(file, newline="", encoding="utf-8") as f:
                      reader = csv.DictReader(f)

                      for row in reader:
                          source = clean_source_url(row.get("source_url", ""))

                          if source:
                              keys.add(normalize_url_key(source))

              return keys

          target_source_keys = get_target_source_keys([
              "p4_p5/documents_p4_p5_01.csv",
              "p4_p5/documents_p4_p5_02.csv",
              "p4_p5/documents_p4_p5_03.csv",
              "p4_p5/documents_p4_p5_04.csv",
              "p4_p5/documents_p4_p5_05.csv",
              "p4_p5/documents_p4_p5_06.csv"
          ])

          # -----------------------
          # Merge output
          # -----------------------
          existing_output_rows = read_csv("p4_p5/output_p4_p5.csv")
          preserved_output_rows = []

          for row in existing_output_rows:
              company_key = normalize_url_key(row.get("company", ""))

              if company_key in target_source_keys:
                  continue

              preserved_output_rows.append(row)

          new_output_rows = []

          for file in glob.glob("shard_outputs/**/output_p4_p5_*_work.csv", recursive=True):
              new_output_rows.extend(read_csv(file))

          output_rows = dedupe_rows(
              preserved_output_rows + new_output_rows,
              key_field="document_url"
          )

          write_csv("p4_p5/output_p4_p5.csv", OUTPUT_FIELDS, output_rows)

          # -----------------------
          # Merge known documents
          # -----------------------
          known_rows = []
          known_rows.extend(read_csv("p4_p5/known_documents_p4_p5.csv"))

          for file in glob.glob("shard_outputs/**/known_documents_p4_p5_*_work.csv", recursive=True):
              known_rows.extend(read_csv(file))

          known_rows = dedupe_rows(known_rows, key_field="document_url")
          write_csv("p4_p5/known_documents_p4_p5.csv", KNOWN_FIELDS, known_rows)

          # -----------------------
          # Merge diff
          # -----------------------
          diff_rows = []
          diff_rows.extend(read_csv("diff_p4_p5.csv"))

          for file in glob.glob("shard_outputs/**/diff_p4_p5_*_work.csv", recursive=True):
              diff_rows.extend(read_csv(file))

          diff_rows = dedupe_rows(diff_rows, key_field="document_url")
          write_csv("diff_p4_p5.csv", DIFF_FIELDS, diff_rows)

          # -----------------------
          # Merge issues
          # -----------------------
          issue_rows = []

          for file in glob.glob("shard_outputs/**/capture_issues_p4_p5_*_work.csv", recursive=True):
              issue_rows.extend(read_csv(file))

          write_csv("p4_p5/capture_issues_p4_p5.csv", ISSUE_FIELDS, issue_rows)

          # -----------------------
          # Merge URL status
          # -----------------------
          status_rows_by_key = {}

          for row in read_csv("p4_p5/url_status_p4_p5.csv"):
              url = row.get("url", "")

              if not url:
                  continue

              status_rows_by_key[normalize_url_key(url)] = {
                  "url": url,
                  "last_working_date": row.get("last_working_date", ""),
                  "last_working_docs_count": row.get("last_working_docs_count", ""),
                  "latest_status_code": row.get("latest_status_code", ""),
                  "latest_issue": row.get("latest_issue", ""),
                  "url_file": row.get("url_file", "")
              }

          for file in glob.glob("shard_outputs/**/url_status_p4_p5_*_work.csv", recursive=True):
              for row in read_csv(file):
                  url = row.get("url", "")

                  if not url:
                      continue

                  key = normalize_url_key(url)

                  existing = status_rows_by_key.get(key, {
                      "url": url,
                      "last_working_date": "",
                      "last_working_docs_count": "",
                      "latest_status_code": "",
                      "latest_issue": "",
                      "url_file": row.get("url_file", "")
                  })

                  existing["url"] = url
                  existing["latest_status_code"] = row.get("latest_status_code", "")
                  existing["latest_issue"] = row.get("latest_issue", "")
                  existing["url_file"] = row.get("url_file", existing.get("url_file", ""))

                  # Update last working only when URL captured documents in that shard run.
                  if row.get("last_working_date", ""):
                      existing["last_working_date"] = row.get("last_working_date", "")
                      existing["last_working_docs_count"] = row.get("last_working_docs_count", "")

                  status_rows_by_key[key] = existing

          url_status_rows = list(status_rows_by_key.values())

          url_status_rows.sort(
              key=lambda r: (
                  r.get("latest_status_code", ""),
                  r.get("url_file", ""),
                  r.get("url", "")
              )
          )

          write_csv("p4_p5/url_status_p4_p5.csv", URL_STATUS_FIELDS, url_status_rows)

          # -----------------------
          # Merge run summary as one P4/P5 total row
          # -----------------------
          summary_rows = read_csv("run_summary_master.csv")

          previous_run_number = 0

          for row in summary_rows:
              try:
                  previous_run_number = max(previous_run_number, int(row.get("run_number", 0)))
              except Exception:
                  pass

          new_summary_rows = []

          for file in glob.glob("shard_outputs/**/run_summary_p4_p5_*_work.csv", recursive=True):
              new_summary_rows.extend(read_csv(file))

          if new_summary_rows:
              previous_run_number += 1

              def safe_int(value):
                  try:
                      return int(value)
                  except Exception:
                      return 0

              latest_date = max(
                  [row.get("date", "") for row in new_summary_rows if row.get("date", "")],
                  default=""
              )

              run_mode_values = [
                  row.get("run_mode", "")
                  for row in new_summary_rows
                  if row.get("run_mode", "")
              ]

              browser_fallback_values = [
                  str(row.get("browser_fallback_enabled", "")).strip().lower()
                  for row in new_summary_rows
              ]

              p4_p5_total_summary_row = {
                  "run_number": str(previous_run_number),
                  "date": latest_date,
                  "run_mode": run_mode_values[0] if run_mode_values else "",
                  "url_file": "p4_p5_total",
                  "total_urls_processed": sum(safe_int(row.get("total_urls_processed", 0)) for row in new_summary_rows),
                  "total_documents_captured": sum(safe_int(row.get("total_documents_captured", 0)) for row in new_summary_rows),
                  "new_diff_records": sum(safe_int(row.get("new_diff_records", 0)) for row in new_summary_rows),
                  "issue_count": sum(safe_int(row.get("issue_count", 0)) for row in new_summary_rows),
                  "success_zero_docs_count": sum(safe_int(row.get("success_zero_docs_count", 0)) for row in new_summary_rows),
                  "fetch_failed_status_count": sum(safe_int(row.get("fetch_failed_status_count", 0)) for row in new_summary_rows),
                  "fetch_error_count": sum(safe_int(row.get("fetch_error_count", 0)) for row in new_summary_rows),
                  "browser_fallback_enabled": "true" if "true" in browser_fallback_values else "false",
                  "output_file": "p4_p5/output_p4_p5.csv",
                  "raw_file": "",
                  "issues_file": "p4_p5/capture_issues_p4_p5.csv"
              }

              summary_rows.append(p4_p5_total_summary_row)

          write_csv("run_summary_master.csv", SUMMARY_FIELDS, summary_rows)

          print(f"Final P4/P5 output rows: {len(output_rows)}")
          print(f"Final P4/P5 known rows: {len(known_rows)}")
          print(f"Final P4/P5 diff rows: {len(diff_rows)}")
          print(f"Final P4/P5 issues rows: {len(issue_rows)}")
          print(f"Final P4/P5 URL status rows: {len(url_status_rows)}")
          print(f"Final P4/P5 shard summary rows found: {len(new_summary_rows)}")
          print("Final P4/P5 summary rows added: 1" if new_summary_rows else "Final P4/P5 summary rows added: 0")
          PY

      - name: Find rows containing Alibaba secret-like patterns
        run: |
          python - <<'PY'
          import csv
          import re
          import sys
          from pathlib import Path

          files_to_check = [
              Path("p4_p5/output_p4_p5.csv"),
              Path("p4_p5/known_documents_p4_p5.csv"),
              Path("p4_p5/capture_issues_p4_p5.csv"),
              Path("p4_p5/url_status_p4_p5.csv"),
              Path("diff_p4_p5.csv"),
          ]

          patterns = [
              ("Alibaba AccessKey ID", re.compile(r"LTAI[0-9A-Za-z]{12,}")),
              ("Alibaba OSSAccessKeyId parameter", re.compile(r"(?i)OSSAccessKeyId=")),
              ("Alibaba AccessKeyId parameter", re.compile(r"(?i)AccessKeyId=")),
              ("Alibaba AccessKeySecret parameter", re.compile(r"(?i)AccessKeySecret=")),
              ("Alibaba Security Token parameter", re.compile(r"(?i)(x-oss-security-token|security-token)=")),
              ("Signed URL Signature parameter", re.compile(r"(?i)Signature=")),
          ]

          def redact_value(text):
              if not text:
                  return ""

              text = str(text)

              text = re.sub(
                  r"LTAI[0-9A-Za-z]{12,}",
                  "[REDACTED_ALIBABA_ACCESS_KEY_ID]",
                  text
              )

              text = re.sub(
                  r"(?i)(OSSAccessKeyId|AccessKeyId|AccessKeySecret|Signature|x-oss-security-token|security-token)=([^,&\s]+)",
                  r"\1=[REDACTED]",
                  text
              )

              return text

          found_any = False

          for file_path in files_to_check:
              if not file_path.exists():
                  continue

              with open(file_path, newline="", encoding="utf-8", errors="replace") as f:
                  reader = csv.DictReader(f)

                  for row_number, row in enumerate(reader, start=2):
                      combined_text = " | ".join(str(value) for value in row.values())

                      matched_patterns = []

                      for label, pattern in patterns:
                          if pattern.search(combined_text):
                              matched_patterns.append(label)

                      if matched_patterns:
                          found_any = True

                          print("SECRET-LIKE PATTERN FOUND")
                          print(f"File: {file_path}")
                          print(f"Row number: {row_number}")
                          print(f"Matched pattern(s): {', '.join(matched_patterns)}")
                          print(f"Company/source URL: {row.get('company') or row.get('source_url') or row.get('url') or ''}")
                          print(f"Document title: {row.get('document_title') or row.get('text') or ''}")

                          document_url = row.get("document_url") or row.get("url") or ""

                          if document_url:
                              print(f"Document URL redacted: {redact_value(document_url)}")

                          error_message = row.get("error_message") or ""

                          if error_message:
                              print(f"Error message redacted: {redact_value(error_message)}")

                          print("---")

          if found_any:
              print("One or more secret-like patterns were found. Stop before commit/push.")
              sys.exit(1)

          print("No Alibaba secret-like patterns found in generated CSV files.")
          PY

      - name: Commit P4 P5 final files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A p4_p5/documents_p4_p5_*.csv p4_p5/output_p4_p5.csv p4_p5/known_documents_p4_p5.csv p4_p5/capture_issues_p4_p5.csv p4_p5/url_status_p4_p5.csv diff_p4_p5.csv run_summary_master.csv 2>/dev/null || true

          git commit -m "Update P4 P5 batch data" || echo "No changes to commit"

          for i in 1 2 3; do
            git pull --rebase origin main && git push && break

            echo "Push/rebase failed. Retry attempt $i..."
            git rebase --abort 2>/dev/null || true
            sleep 10
          done
