name: Run Scraper

on:
  workflow_dispatch:
    inputs files    inputs:
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output*.csv raw_links*.csv capture_issues*.csv diff.csv run_summary*.csv 2>/dev/null || true

          git commit -m "Update scraped data" || echo "No changes to commit"

          git push
      run_mode:
        description: "Choose run mode"
        required: true
        type: choice
        options:
          - full
          - test
          - baseline
        default: full

      url_file:
        description: "CSV file to run"
        required: true
        type: choice
        options:
          - documents.csv
          - test_urls.csv
          - baseline_urls.csv
        default: documents.csv

      enable_browser_fallback:
        description: "Use browser fallback only for failed/zero-doc URLs?"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      RUN_MODE: ${{ github.event.inputs.run_mode }}
      TARGET_URL_FILE: ${{ github.event.inputs.url_file }}
      ENABLE_BROWSER_FALLBACK: ${{ github.event.inputs.enable_browser_fallback }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run script
        run: python scrape.py

