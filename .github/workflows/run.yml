name: Run Scraper

on:
  workflow_dispatch:
  # Enable later for automatic daily run:
  # schedule:
  #   - cron: "0 3 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run script
        run: python scrape.py

      - name: Commit and push output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output.csv raw_links.csv diff.csv capture_issues.csv run_summary.csv

          git commit -m "Update scraped data" || echo "No changes to commit"

          git push
