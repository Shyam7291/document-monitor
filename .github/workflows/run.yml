name: Run Scraper

"on":
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - test
          - seed
          - baseline

      url_file:
        description: "CSV file to run"
        required: true
        default: "documents_p2.csv"
        type: choice
        options:
          - documents.csv
          - documents_p1.csv
          - documents_p2.csv
          - documents_p3.csv
          - test_urls.csv
          - baseline_urls.csv

      enable_browser_fallback:
        description: "Use browser fallback only for failed/zero-doc/hash URLs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      sleep_seconds:
        description: "Delay between URLs to reduce blocking"
        required: true
        default: "2"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "5"

  schedule:
    # Scheduled P2 production run every 3 days at 03:00 UTC / 08:30 IST approximately
    - cron: "0 3 */3 * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # For manual workflow_dispatch, use selected inputs.
      # For scheduled runs, inputs are empty, so defaults below are used.
      RUN_MODE: ${{ github.event.inputs.run_mode || 'full' }}
      TARGET_URL_FILE: ${{ github.event.inputs.url_file || 'documents_p2.csv' }}
      ENABLE_BROWSER_FALLBACK: ${{ github.event.inputs.enable_browser_fallback || 'false' }}
      SLEEP_SECONDS: ${{ github.event.inputs.sleep_seconds || '2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show run configuration
        run: |
          echo "RUN_MODE=$RUN_MODE"
          echo "TARGET_URL_FILE=$TARGET_URL_FILE"
          echo "ENABLE_BROWSER_FALLBACK=$ENABLE_BROWSER_FALLBACK"
          echo "SLEEP_SECONDS=$SLEEP_SECONDS"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run script
        run: python scrape.py

      - name: Commit and push output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A output*.csv raw_links*.csv capture_issues*.csv diff.csv run_summary*.csv 2>/dev/null || true

          git commit -m "Update scraped data" || echo "No changes to commit"

          git push
